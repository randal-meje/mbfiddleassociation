[build]
  command = "npm run build"
  publish = "dist"

[[plugins]]
  package = "@netlify/plugin-lighthouse"

  [plugins.inputs.thresholds]
    performance = 0.8
    accessibility = 0.9
    best-practices = 0.85
    seo = 0.9

  [[plugins.inputs.audits]]
    path = "en"

  [[plugins.inputs.audits]]
    path = "en/about"

  [[plugins.inputs.audits]]
    path = "en/join"

  [[plugins.inputs.audits]]
    path = "en/events"

  [[plugins.inputs.audits]]
    path = "en/news"
